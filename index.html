<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Late Night Talks: Somewhere at 2 AM</title>

<style>
body{
    margin:0;
    background:#0b1020;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.container{
    max-width:700px;
    padding:20px;
}

h1{
    font-size:42px;
}

p{
    font-size:20px;
    color:#d1d5db;
}

button{
    margin-top:20px;
    padding:12px 30px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

#game{
    display:none;
}
</style>
</head>

<body>

<div class="container" id="menu">
    <h1>🌙 Late Night Talks:<br>Somewhere at 2 AM</h1>

    <p>
        "Kota sudah tertidur,<br>
        namun beberapa cerita masih terjaga."
    </p>

    <button onclick="mulaiGame()">Mulai</button>
</div>

<div class="container" id="game">
    <h2 id="judul">Pukul 02.03</h2>

    <p id="cerita">
        Udara malam terasa dingin.
        Jalanan sepi.
        Hanya suara angin dan lampu jalan yang menemani.
    </p>

    <button onclick="lanjut()">Lanjut</button>
</div>

<script>

const cerita = [
"Udara malam terasa dingin. Jalanan sepi. Hanya suara angin dan lampu jalan yang menemani.",
"Entah kenapa, malam ini terasa berbeda.",
"Kadang kita tidak mencari jawaban. Kita hanya ingin ada seseorang yang mau mendengarkan.",
"Beberapa orang pergi. Bukan karena tidak peduli.",
"Terkadang mereka hanya sedang mencari jalan pulang.",
"Lucu ya. Saat bersama seseorang, waktu terasa cepat.",
"Tapi saat sendirian, satu menit terasa sangat lama.",
"Tidak semua perasaan harus diungkapkan.",
"Ada yang cukup disimpan, lalu dikenang.",
"Pukul 02.47. Terima kasih sudah berjalan sampai sejauh ini. Sampai jumpa di malam berikutnya."
];

let index = 0;

function mulaiGame(){
    document.getElementById("menu").style.display="none";
    document.getElementById("game").style.display="block";
}

function lanjut(){
    index++;

    if(index < cerita.length){
        document.getElementById("cerita").innerText = cerita[index];
    }else{
        document.getElementById("cerita").innerText =
        "Tamat 🌙";
    }
}

</script>

</body>
</html>
